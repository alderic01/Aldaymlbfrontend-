<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALLDAY MLB EDGE</title>
  <meta name="theme-color" content="#08111f" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#08111f; --bg2:#0d1727; --bg3:#122238; --card:#0d1828; --line:#1b3150;
      --text:#e8f0fa; --muted:#89a0bd; --teal:#00e5aa; --gold:#ffd54a; --red:#ff5f6d;
      --blue:#59a9ff; --orange:#ff9e57; --green:#00d46a; --purple:#a88dff;
      --shadow:0 12px 30px rgba(0,0,0,.32);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:linear-gradient(180deg,#07101c 0%,#091322 100%);color:var(--text);font-family:Inter,system-ui,sans-serif}
    button,input,select{font:inherit}
    .app{max-width:1500px;margin:0 auto;padding:18px}
    .topbar{position:sticky;top:0;z-index:50;background:rgba(8,17,31,.9);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.05)}
    .topbar-inner{max-width:1500px;margin:0 auto;padding:14px 18px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:14px;min-width:270px}
    .logo{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--teal),#0d6efd);display:grid;place-items:center;font-size:24px;box-shadow:var(--shadow)}
    .title{font-family:"Barlow Condensed",sans-serif;font-weight:800;letter-spacing:1.5px;font-size:28px;line-height:.9}
    .subtitle{font-size:11px;letter-spacing:2.5px;color:var(--teal);font-weight:800;text-transform:uppercase;margin-top:4px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-left:auto}
    .field,.button,.pill,.tab{border:1px solid var(--line);background:var(--bg2);color:var(--text);border-radius:12px}
    .field{padding:10px 12px;min-height:42px}
    .button{padding:10px 14px;font-weight:700;cursor:pointer;transition:.18s transform,.18s border-color,.18s background}
    .button:hover{transform:translateY(-1px);border-color:#315889}
    .button.primary{background:linear-gradient(135deg,var(--teal),#32c7ff);color:#07101c;border:none}
    .button.warn{background:linear-gradient(135deg,var(--gold),#ff9f43);color:#07101c;border:none}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;padding:14px 0 6px}
    .tab{padding:10px 14px;cursor:pointer;font-family:"Barlow Condensed",sans-serif;font-size:18px;letter-spacing:1px;text-transform:uppercase}
    .tab.active{background:linear-gradient(135deg,#0f2137,#173454);border-color:#2f5d8c;color:var(--gold)}
    .hero{display:grid;grid-template-columns:1.15fr .85fr;gap:16px;margin:18px 0}
    .card{background:linear-gradient(180deg,rgba(18,34,56,.95),rgba(11,22,37,.98));border:1px solid rgba(63,101,147,.35);border-radius:18px;box-shadow:var(--shadow)}
    .hero-main{padding:22px}
    .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:2.2px;color:var(--teal);font-weight:800}
    .hero-title{font-family:"Barlow Condensed",sans-serif;font-size:52px;line-height:.9;letter-spacing:1px;margin:10px 0 14px}
    .hero-copy{color:#bfd0e4;max-width:62ch;line-height:1.55}
    .hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
    .hero-side{padding:18px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px;align-content:start}
    .stat{background:rgba(6,14,26,.55);border:1px solid rgba(72,114,167,.25);border-radius:16px;padding:16px}
    .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:1.8px;color:var(--muted);font-weight:800}
